name: Repo Health Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required files and directories
        run: |
          required_files=(
            "README.md"
            "START_HERE.md"
            "MISSION.md"
            "DOCTRINE.md"
            "USE_CASES.md"
            "LIMITATIONS.md"
            "SECURITY.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "VERSION"
            "CHANGELOG.md"
            ".gitattributes"
          )

          required_dirs=(
            ".github/workflows"
            ".github/ISSUE_TEMPLATE"
            "docs/evidence-cards"
            "docs/briefs"
            "docs/governance"
            "docs/playbooks"
            "docs/radar"
            "templates"
            "data/schemas"
            "data/synthetic"
            "examples"
            "scripts"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required file: $file"
              missing=1
            else
              echo "Found file: $file"
            fi
          done

          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "::error::Missing required directory: $dir"
              missing=1
            else
              echo "Found directory: $dir"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "All required files and directories present."
